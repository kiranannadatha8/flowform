name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: formflow
          POSTGRES_PASSWORD: formflow
          POSTGRES_DB: formflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U formflow -d formflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      DATABASE_URL: postgresql://formflow:formflow@localhost:5432/formflow?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run db:seed

      - run: npm run lint

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
