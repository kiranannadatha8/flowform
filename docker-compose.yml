services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Host 5433 avoids clashing with a local Postgres on 5432
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: formflow
      POSTGRES_PASSWORD: formflow
      POSTGRES_DB: formflow
    volumes:
      - formflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formflow -d formflow"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  formflow_pgdata:
